<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MerlotTV - Link Device</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0D0D0D;
            color: #E8E8F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            color: #00E5FF;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
        }
        .logo p {
            color: #6B6B80;
            font-size: 14px;
            margin-top: 8px;
        }
        .card {
            background: #161620;
            border: 1px solid #2A2A3A;
            border-radius: 12px;
            padding: 24px;
        }
        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #6B6B80;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #111118;
            border: 1px solid #2A2A3A;
            border-radius: 8px;
            color: #E8E8F0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #00E5FF;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: #00E5FF;
            color: #000;
        }
        .btn-secondary {
            background: #1A1A24;
            color: #E8E8F0;
            border: 1px solid #2A2A3A;
            margin-top: 12px;
        }
        .error {
            background: rgba(255, 71, 87, 0.15);
            color: #FF4757;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success {
            text-align: center;
            padding: 32px 0;
        }
        .success .check {
            width: 64px;
            height: 64px;
            background: rgba(0, 214, 143, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
        }
        .success h2 { color: #00D68F; }
        .success p { color: #6B6B80; margin-top: 8px; font-size: 14px; }
        .code-display {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            background: #111118;
            border-radius: 8px;
            border: 1px solid #2A2A3A;
        }
        .code-display .label { font-size: 12px; color: #6B6B80; }
        .code-display .code {
            font-size: 24px;
            font-weight: 700;
            color: #00E5FF;
            letter-spacing: 4px;
            margin-top: 4px;
        }
        .hidden { display: none !important; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Code entry screen */
        .code-input-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .code-input-group input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: #111118;
            border: 2px solid #2A2A3A;
            border-radius: 8px;
            color: #00E5FF;
            outline: none;
            text-transform: uppercase;
        }
        .code-input-group input:focus {
            border-color: #00E5FF;
        }
        .toggle-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #6B6B80;
        }
        .toggle-link a {
            color: #00E5FF;
            text-decoration: none;
            cursor: pointer;
        }
        .toggle-link a:hover {
            text-decoration: underline;
        }
        .password-hint {
            font-size: 11px;
            color: #6B6B80;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>MERLOT TV</h1>
            <p>Link your TV device</p>
        </div>

        <!-- Step 1: Enter code (if not in URL) -->
        <div class="card" id="step-code">
            <h2>Enter Device Code</h2>
            <p style="color: #6B6B80; font-size: 13px; text-align: center; margin-bottom: 20px;">
                Enter the code shown on your TV screen
            </p>
            <div class="code-input-group" id="code-inputs">
                <input type="text" maxlength="1" data-index="0" autocomplete="off">
                <input type="text" maxlength="1" data-index="1" autocomplete="off">
                <input type="text" maxlength="1" data-index="2" autocomplete="off">
                <span style="color: #6B6B80; font-size: 24px; line-height: 56px;">-</span>
                <input type="text" maxlength="1" data-index="3" autocomplete="off">
                <input type="text" maxlength="1" data-index="4" autocomplete="off">
                <input type="text" maxlength="1" data-index="5" autocomplete="off">
            </div>
            <div class="error" id="code-error"></div>
            <button class="btn btn-primary" id="btn-verify-code">Continue</button>
        </div>

        <!-- Step 2: Sign in or Sign up -->
        <div class="card hidden" id="step-auth">
            <h2 id="auth-title">Sign In</h2>
            <div class="code-display" id="code-display-box">
                <div class="label">Linking code</div>
                <div class="code" id="display-code"></div>
            </div>
            <div class="error" id="auth-error"></div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
                <div class="password-hint hidden" id="password-hint">Must be at least 6 characters</div>
            </div>
            <div class="form-group hidden" id="confirm-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm password" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" id="btn-auth">
                Sign In & Link Device
            </button>
            <div class="toggle-link" id="toggle-auth">
                Don't have an account? <a id="toggle-link">Sign Up</a>
            </div>
            <button class="btn btn-secondary" id="btn-back-to-code">Back</button>
        </div>

        <!-- Step 3: Success -->
        <div class="card hidden" id="step-success">
            <div class="success">
                <div class="check">&#10003;</div>
                <h2>Device Linked!</h2>
                <p>Your TV will sign in automatically.<br>You can close this page.</p>
            </div>
        </div>
    </div>

    <script>
        // Firebase project config
        const API_KEY = 'AIzaSyC9eMpUTlUyjWP5NzHeifaKrVS-PFaoSJc';
        const PROJECT_ID = 'merlot-tv';
        const FIRESTORE_BASE = 'https://firestore.googleapis.com/v1/projects/' + PROJECT_ID + '/databases/(default)/documents';
        const AUTH_BASE = 'https://identitytoolkit.googleapis.com/v1';

        let currentCode = '';
        let isSignUp = false;

        // Check URL for code parameter
        const params = new URLSearchParams(window.location.search);
        const urlCode = params.get('code');
        if (urlCode && urlCode.length === 6) {
            currentCode = urlCode.toUpperCase();
            showAuth();
        }

        // ─── Code input handling ───
        const codeInputs = document.querySelectorAll('#code-inputs input');
        codeInputs.forEach((input, i) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value.toUpperCase();
                e.target.value = val;
                if (val && i < 5) {
                    codeInputs[i + 1].focus();
                }
                const full = Array.from(codeInputs).map(inp => inp.value).join('');
                if (full.length === 6) {
                    currentCode = full;
                    verifyCode();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) {
                    codeInputs[i - 1].focus();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = (e.clipboardData.getData('text') || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
                for (let j = 0; j < Math.min(pasted.length, 6 - i); j++) {
                    codeInputs[i + j].value = pasted[j];
                }
                const nextEmpty = Array.from(codeInputs).findIndex(inp => !inp.value);
                if (nextEmpty >= 0) codeInputs[nextEmpty].focus();
                else codeInputs[5].focus();

                const full = Array.from(codeInputs).map(inp => inp.value).join('');
                if (full.length === 6) {
                    currentCode = full;
                    verifyCode();
                }
            });
        });

        document.getElementById('btn-verify-code').addEventListener('click', () => {
            const full = Array.from(codeInputs).map(inp => inp.value).join('');
            if (full.length !== 6) {
                showError('code-error', 'Please enter all 6 characters');
                return;
            }
            currentCode = full.toUpperCase();
            verifyCode();
        });

        // ─── Verify code exists in Firestore via REST ───
        async function verifyCode() {
            try {
                const resp = await fetch(FIRESTORE_BASE + '/device_codes/' + currentCode);
                if (resp.status === 404) {
                    showError('code-error', 'Invalid code. Check the code on your TV and try again.');
                    return;
                }
                if (!resp.ok) {
                    showError('code-error', 'Could not verify code. Please try again.');
                    return;
                }
                const doc = await resp.json();
                const status = doc.fields && doc.fields.status && doc.fields.status.stringValue;
                if (status !== 'pending') {
                    showError('code-error', 'This code has already been used or expired.');
                    return;
                }
                showAuth();
            } catch (err) {
                showError('code-error', 'Could not verify code. Please try again.');
            }
        }

        function showAuth() {
            document.getElementById('step-code').classList.add('hidden');
            document.getElementById('step-auth').classList.remove('hidden');
            const display = currentCode.substring(0, 3) + '-' + currentCode.substring(3);
            document.getElementById('display-code').textContent = display;
            document.getElementById('email').focus();
            updateAuthMode();
        }

        // ─── Toggle between Sign In and Sign Up ───
        document.getElementById('toggle-link').addEventListener('click', () => {
            isSignUp = !isSignUp;
            updateAuthMode();
            hideError('auth-error');
        });

        function updateAuthMode() {
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('btn-auth');
            const confirmGroup = document.getElementById('confirm-group');
            const passwordHint = document.getElementById('password-hint');
            const toggleText = document.getElementById('toggle-auth');
            const toggleLink = document.getElementById('toggle-link');

            if (isSignUp) {
                title.textContent = 'Create Account';
                btn.textContent = 'Sign Up & Link Device';
                confirmGroup.classList.remove('hidden');
                passwordHint.classList.remove('hidden');
                toggleText.innerHTML = 'Already have an account? <a id="toggle-link">Sign In</a>';
            } else {
                title.textContent = 'Sign In';
                btn.textContent = 'Sign In & Link Device';
                confirmGroup.classList.add('hidden');
                passwordHint.classList.add('hidden');
                toggleText.innerHTML = 'Don\'t have an account? <a id="toggle-link">Sign Up</a>';
            }

            // Re-attach toggle listener since innerHTML replaced the element
            document.getElementById('toggle-link').addEventListener('click', () => {
                isSignUp = !isSignUp;
                updateAuthMode();
                hideError('auth-error');
            });
        }

        document.getElementById('btn-back-to-code').addEventListener('click', () => {
            document.getElementById('step-auth').classList.add('hidden');
            document.getElementById('step-code').classList.remove('hidden');
            currentCode = '';
            codeInputs.forEach(inp => inp.value = '');
            codeInputs[0].focus();
        });

        // ─── Auth action ───
        document.getElementById('btn-auth').addEventListener('click', doAuth);
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isSignUp) doAuth();
        });

        async function doAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-auth');

            if (!email || !password) {
                showError('auth-error', 'Email and password are required');
                return;
            }

            if (isSignUp) {
                if (password.length < 6) {
                    showError('auth-error', 'Password must be at least 6 characters');
                    return;
                }
                const confirmPassword = document.getElementById('confirm-password').value;
                if (password !== confirmPassword) {
                    showError('auth-error', 'Passwords do not match');
                    return;
                }
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>' + (isSignUp ? 'Creating account...' : 'Signing in...');
            hideError('auth-error');

            try {
                // Choose endpoint based on sign in vs sign up
                const endpoint = isSignUp
                    ? AUTH_BASE + '/accounts:signUp?key=' + API_KEY
                    : AUTH_BASE + '/accounts:signInWithPassword?key=' + API_KEY;

                const authResp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        returnSecureToken: true
                    })
                });

                const authData = await authResp.json();

                if (!authResp.ok) {
                    const errorCode = authData.error && authData.error.message;
                    let msg = isSignUp ? 'Account creation failed' : 'Sign in failed';

                    if (errorCode === 'INVALID_LOGIN_CREDENTIALS' || errorCode === 'INVALID_PASSWORD' || errorCode === 'EMAIL_NOT_FOUND') {
                        msg = 'Invalid email or password';
                    } else if (errorCode === 'INVALID_EMAIL') {
                        msg = 'Please enter a valid email address';
                    } else if (errorCode === 'EMAIL_EXISTS') {
                        msg = 'An account with this email already exists. Try signing in instead.';
                    } else if (errorCode === 'WEAK_PASSWORD' || (errorCode && errorCode.startsWith('WEAK_PASSWORD'))) {
                        msg = 'Password is too weak — use at least 6 characters';
                    } else if (errorCode === 'TOO_MANY_ATTEMPTS_TRY_LATER') {
                        msg = 'Too many attempts. Try again later.';
                    } else if (errorCode === 'USER_DISABLED') {
                        msg = 'This account has been disabled';
                    }

                    showError('auth-error', msg);
                    btn.disabled = false;
                    btn.textContent = isSignUp ? 'Sign Up & Link Device' : 'Sign In & Link Device';
                    return;
                }

                const idToken = authData.idToken;

                // Update Firestore document to link the device
                const updateResp = await fetch(
                    FIRESTORE_BASE + '/device_codes/' + currentCode
                        + '?updateMask.fieldPaths=status&updateMask.fieldPaths=email&updateMask.fieldPaths=password',
                    {
                        method: 'PATCH',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + idToken
                        },
                        body: JSON.stringify({
                            fields: {
                                status: { stringValue: 'linked' },
                                email: { stringValue: email },
                                password: { stringValue: password }
                            }
                        })
                    }
                );

                if (!updateResp.ok) {
                    // Fallback: try without auth (for open Firestore rules)
                    const fallbackResp = await fetch(
                        FIRESTORE_BASE + '/device_codes/' + currentCode
                            + '?updateMask.fieldPaths=status&updateMask.fieldPaths=email&updateMask.fieldPaths=password',
                        {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                fields: {
                                    status: { stringValue: 'linked' },
                                    email: { stringValue: email },
                                    password: { stringValue: password }
                                }
                            })
                        }
                    );

                    if (!fallbackResp.ok) {
                        showError('auth-error', (isSignUp ? 'Account created' : 'Signed in') + ' but failed to link device. Please try again.');
                        btn.disabled = false;
                        btn.textContent = isSignUp ? 'Sign Up & Link Device' : 'Sign In & Link Device';
                        return;
                    }
                }

                // Show success
                document.getElementById('step-auth').classList.add('hidden');
                document.getElementById('step-success').classList.remove('hidden');

            } catch (err) {
                showError('auth-error', 'Network error. Check your connection and try again.');
                btn.disabled = false;
                btn.textContent = isSignUp ? 'Sign Up & Link Device' : 'Sign In & Link Device';
            }
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>
</html>
